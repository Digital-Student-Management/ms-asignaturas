spring.application.name=ms-asignaturas

# ── Servidor ───────────────────────────────────────────────────────────────────
server.port=8081

# ── Base de datos MySQL ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/db_asignaturas?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=fullstack3-2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Swagger / OpenAPI ──────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
